<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capital en Marcha</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f8fafc;
    margin: 0;
    padding: 40px;
}

.contenedor {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitulo {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
}

label {
    display: block;
    margin-top: 20px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 25px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.resultado {
    margin-top: 30px;
    background: #ecfdf5;
    padding: 20px;
    border-radius: 12px;
    line-height: 1.8;
}
</style>
</head>

<body>

<div class="contenedor">

<h1>Capital en Marcha</h1>

<p class="subtitulo">
Descubre cuándo alcanzarás tus objetivos financieros.
</p>

<label>Patrimonio actual (€)</label>
<input type="number" id="patrimonio" value="1000">

<label>Ahorro mensual (€)</label>
<input type="number" id="ahorro" value="300">

<label>Rentabilidad anual esperada (%)</label>
<input type="number" id="rentabilidad" value="8">

<button onclick="calcular()">
Calcular mi camino
</button>

<div class="resultado" id="resultado">
Introduce tus datos y pulsa calcular.
</div>

</div>

<script>
function calcular() {

let patrimonio = Number(document.getElementById("patrimonio").value);
let ahorro = Number(document.getElementById("ahorro").value);
let rentabilidad = Number(document.getElementById("rentabilidad").value);

let objetivos = [100000,250000,500000,1000000];

let resultado = "";

objetivos.forEach(objetivo => {

let total = patrimonio;
let meses = 0;

while(total < objetivo && meses < 1000*12){
    total = total * (1 + rentabilidad/100/12);
    total += ahorro;
    meses++;
}

let anos = Math.floor(meses/12);

resultado += "🎯 " + objetivo.toLocaleString("es-ES") + " € → " + anos + " años<br>";

});

document.getElementById("resultado").innerHTML = resultado;

}
</script>

</body>
</html>
