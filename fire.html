<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora FIRE | Capital en Marcha</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f8fafc;
    margin:0;
    color:#0f172a;
}

.container{
    max-width:800px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:#64748b;
    margin-bottom:40px;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    font-size:18px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.resultado{
    margin-top:30px;
    padding:25px;
    background:#ecfdf5;
    border-radius:12px;
    line-height:1.8;
}

a{
    color:#2563eb;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Calculadora FIRE</h1>

<p class="sub">
Descubre cuánto patrimonio necesitarías para alcanzar la independencia financiera usando la regla del 4%.
</p>

<label>Gasto mensual (€)</label>
<input type="number" id="gasto" value="1500">

<button onclick="calcularFIRE()">
Calcular mi número FIRE
</button>

<div class="resultado" id="resultado">
Introduce tus datos y pulsa calcular.
</div>

<br>

<a href="index.html">← Volver a Capital en Marcha</a>

</div>

<script>

function calcularFIRE(){

let gastoMensual =
Number(document.getElementById("gasto").value);

let gastoAnual = gastoMensual * 12;

let patrimonioFire = gastoAnual * 25;

document.getElementById("resultado").innerHTML = `
<h3>Resultado</h3>

<p><strong>Gasto anual:</strong>
${gastoAnual.toLocaleString("es-ES")} €</p>

<p><strong>Patrimonio FIRE necesario:</strong>
${patrimonioFire.toLocaleString("es-ES")} €</p>

<p>
Aplicando la regla del 4%, ese patrimonio podría generar aproximadamente
${gastoAnual.toLocaleString("es-ES")} € al año.
</p>

`;
}

</script>

</body>
</html>
